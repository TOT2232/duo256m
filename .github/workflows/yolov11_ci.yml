name: RuyiSDK YOLOv11 Duo256M CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-yolov11:
    runs-on: self-hosted

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make build-essential wget

      - name: 2. Install RuyiSDK 
        run: |
          if ! command -v ruyi &> /dev/null; then
            wget https://mirror.iscas.ac.cn/ruyisdk/ruyi/tags/0.47.0/ruyi-0.47.0.amd64
            chmod +x ruyi-0.47.0.amd64
            # 既然咱们已经配置了 ci-runner 的 sudo 免密，这里可以直接放心用 sudo
            sudo cp ruyi-0.47.0.amd64 /usr/local/bin/ruyi
            
            # 使用国内镜像源防止拉取工具链失败
            git config --global url."https://mirror.ghproxy.com/https://github.com/".insteadOf "https://github.com/"
            ruyi update
            ruyi install gnu-milkv-milkv-duo-musl-bin
            git config --global --unset url."https://mirror.ghproxy.com/https://github.com/".insteadOf
          else
            echo "RuyiSDK 已驻留本地，直接复用！"
          fi
          
          if [ ! -d "milkv-venv" ]; then
            ruyi venv -t gnu-milkv-milkv-duo-musl-bin generic milkv-venv
          else
            echo "milkv-venv 交叉编译环境已存在，跳过创建。"
          fi
      - name: Verify toolchain
        run: |
          source milkv-venv/bin/ruyi-activate
          which riscv64-unknown-linux-musl-gcc
          riscv64-unknown-linux-musl-gcc --version

      - name: Clone TDL SDK
        run: |
          rm -rf cvitek-tdl-sdk-sg200x
          git clone https://github.com/milkv-duo/cvitek-tdl-sdk-sg200x.git

      - name: Build sample_yolov8 for YOLOv11
        run: |
          source milkv-venv/bin/ruyi-activate
          SDK_PATH="$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x"
          cd "$SDK_PATH/sample/cvi_yolo"
          make sample_yolov8 \
            KERNEL_ROOT="$SDK_PATH/sample" \
            MW_PATH="$SDK_PATH/sample/3rd/middleware/v2" \
            TPU_PATH="$SDK_PATH/sample/3rd/tpu" \
            IVE_PATH="$SDK_PATH/sample/3rd/middleware/v2" \
            CHIP=CV181X \
            SDK_VER=musl_riscv64

      - name: Download YOLOv11 cvimodel
        run: |
          rm -rf yolo11-obiect-dection
          git clone https://github.com/zwyzwm/yolo11-obiect-dection.git

      - name: Download test image
        run: |
          rm -f test.jpg
          wget https://ultralytics.com/images/zidane.jpg -O test.jpg

      - name: Collect artifacts
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          cp cvitek-tdl-sdk-sg200x/sample/cvi_yolo/sample_yolov8 artifacts/
          cp yolo11-obiect-dection/yolo11n_cv181x_int8_sym.cvimodel artifacts/
          cp test.jpg artifacts/

      - name: Deploy files to Milk-V Duo
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 192.168.42.1 >> ~/.ssh/known_hosts
          scp artifacts/sample_yolov8 artifacts/test.jpg root@192.168.42.1:/root/
          scp artifacts/yolo11n_cv181x_int8_sym.cvimodel root@192.168.42.1:/root/

      - name: Run inference on Milk-V Duo
        run: |
          ssh root@192.168.42.1 "
            cd /root &&
            export LD_LIBRARY_PATH='/mnt/system/lib' &&
            chmod +x sample_yolov8 &&
            ./sample_yolov8 ./yolo11n_cv181x_int8_sym.cvimodel test.jpg > result.log 2>&1 &&
            cat result.log
          "

      - name: Retrieve result log
        run: |
          scp root@192.168.42.1:/root/result.log ./result.log
          
      - name: Check inference result
        run: |
          grep "objnum:" result.log

      - name: Upload result log
        uses: actions/upload-artifact@v4
        with:
          name: yolo-inference-log
          path: result.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yolov11-duo256m-runtime-files
          path: artifacts/
