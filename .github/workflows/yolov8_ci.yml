name: YOLOv8 RuyiSDK CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-yolov8:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make build-essential wget

      - name: Install RuyiSDK
        run: |
          wget https://mirror.iscas.ac.cn/ruyisdk/ruyi/tags/0.47.0/ruyi-0.47.0.amd64
          chmod +x ruyi-0.47.0.amd64
          sudo cp ruyi-0.47.0.amd64 /usr/local/bin/ruyi
          ruyi update
          ruyi install gnu-milkv-milkv-duo-musl-bin

      - name: Create Ruyi virtual environment
        run: |
          ruyi venv -t gnu-milkv-milkv-duo-musl-bin generic milkv-venv
          source milkv-venv/bin/ruyi-activate
          which riscv64-unknown-linux-musl-gcc
          riscv64-unknown-linux-musl-gcc --version

      - name: Download TDL SDK
        run: |
          git clone https://github.com/milkv-duo/cvitek-tdl-sdk-sg200x.git

      - name: Build sample_yolov8
        run: |
          source milkv-venv/bin/ruyi-activate

          cd cvitek-tdl-sdk-sg200x/sample/cvi_yolo

          make sample_yolov8 \
            KERNEL_ROOT=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample \
            MW_PATH=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample/3rd/middleware/v2 \
            TPU_PATH=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample/3rd/tpu \
            IVE_PATH=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample/3rd/middleware/v2 \
            CHIP=CV181X \
            SDK_VER=musl_riscv64

      - name: Download model and test image
        run: |
          mkdir -p artifacts

          wget https://github.com/zwyzwm/YOLOv8-Object-Detection/raw/main/yolov8n_cv181x_int8_sym.cvimodel \
            -O artifacts/yolov8n_cv181x_int8_sym.cvimodel

          wget https://ultralytics.com/images/zidane.jpg \
            -O artifacts/test.jpg

          cp cvitek-tdl-sdk-sg200x/sample/cvi_yolo/sample_yolov8 artifacts/

      - name: Check build outputs
        run: |
          test -f artifacts/sample_yolov8
          test -f artifacts/yolov8n_cv181x_int8_sym.cvimodel
          test -f artifacts/test.jpg

          file artifacts/sample_yolov8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yolov8-duo256m-test-files
          path: artifacts/
