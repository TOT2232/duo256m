name: YOLOv8 Duo 256M Auto-Test CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install RuyiSDK 
        run: |
          if ! command -v ruyi &> /dev/null; then
            wget https://mirror.iscas.ac.cn/ruyisdk/ruyi/tags/0.47.0/ruyi-0.47.0.amd64
            chmod +x ruyi-0.47.0.amd64
            sudo cp ruyi-0.47.0.amd64 /usr/local/bin/ruyi
            ruyi update
            ruyi install gnu-milkv-milkv-duo-musl-bin
          else
            echo "RuyiSDK 已驻留本地，直接复用！"
          fi
          
          ruyi venv -t gnu-milkv-milkv-duo-musl-bin generic milkv-venv || true

      - name: 3. Prepare TDL SDK
        run: |
          rm -rf cvitek-tdl-sdk-sg200x
          git clone --depth 1 https://github.com/milkv-duo/cvitek-tdl-sdk-sg200x.git

      - name: 4. Build sample_yolov8
        run: |
          source milkv-venv/bin/ruyi-activate
          cd cvitek-tdl-sdk-sg200x/sample/cvi_yolo

          make sample_yolov8 \
            KERNEL_ROOT=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample \
            MW_PATH=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample/3rd/middleware/v2 \
            TPU_PATH=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample/3rd/tpu \
            IVE_PATH=$GITHUB_WORKSPACE/cvitek-tdl-sdk-sg200x/sample/3rd/middleware/v2 \
            CHIP=CV181X \
            SDK_VER=musl_riscv64

      - name: 5. Download test files and Package
        run: |
          mkdir -p artifacts
          wget https://github.com/zwyzwm/YOLOv8-Object-Detection/raw/main/yolov8n_cv181x_int8_sym.cvimodel \
            -O artifacts/yolov8n_cv181x_int8_sym.cvimodel
          wget https://ultralytics.com/images/zidane.jpg \
            -O artifacts/test.jpg
          cp cvitek-tdl-sdk-sg200x/sample/cvi_yolo/sample_yolov8 artifacts/

          cd artifacts
          tar -czvf duo_test_package.tar.gz sample_yolov8 yolov8n_cv181x_int8_sym.cvimodel test.jpg

      - name: 6. Listen for Duo 256M logs
        run: |
          # 监听 8084 端口，准备接收板子的实测数据
          echo "在大管家后台开启 8084 端口监听..."
          timeout 120 nc -l -p 8084 > duo_result.log &
          echo "LISTENER_PID=$!" >> $GITHUB_ENV

      - name: 7. Send package via Stunnel 
        run: |
          # 往 8083 发送端砸包裹，隧道会自动送到 Duo 的 8443
          echo "正在把编译好的压缩包砸进 8083 隧道入口..."
          cd artifacts
          nc -w 3 127.0.0.1 8083 < duo_test_package.tar.gz

      - name: 8. Wait for test results 
        run: |
          echo "包裹投递成功，正在等待 Duo 256M 板端传回推理结果..."
          wait ${{ env.LISTENER_PID }} || true
          
          echo "✅ ====== Milk-V Duo 256M 实机测试日志 ======"
          cat duo_result.log
